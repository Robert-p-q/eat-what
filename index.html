<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么</title>

<style>
  :root {
  /* ===== 背景 ===== */
  --bg-page:        #C9DFF7;
  --bg-blob1:       #90BCE8;
  --bg-blob2:       #5B9BD5;
  --bg-blob3:       #3A78C9;
  --bg-blob4:       #1A4F8A;

  /* ===== 毛玻璃 ===== */
  --glass-card:     rgba(255, 255, 255, 0.38);
  --glass-border:   rgba(255, 255, 255, 0.72);
  --glass-sel:      rgba(255, 255, 255, 0.45);
  --glass-btn-sm:   rgba(255, 255, 255, 0.35);
  --glass-result:   rgba(255, 255, 255, 0.32);
  --glass-blur:     blur(22px);

  /* ===== 按钮 ===== */
  --btn-primary:        #1A4F8A;
  --btn-primary-hover:  #3A78C9;
  --btn-primary-text:   #E8F3FC;

  /* ===== 文字 ===== */
  --text-title:     #0D2B4E;
  --text-sub:       #3A78C9;
  --text-hint:      #3A78C9;

  /* ===== 功能色 ===== */
  --dot-swap:       #5B9BD5;
  --dot-fav:        #E05555;
  --dot-ban:        #8FA8C0;
  --dot-favlist:    #2A9D8F;
}

html, body{
  min-height: 100%;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

  background: var(--bg-page);

  background-image:
    radial-gradient(circle at 20% 20%, var(--bg-blob1), transparent 40%),
    radial-gradient(circle at 80% 30%, var(--bg-blob2), transparent 50%),
    radial-gradient(circle at 30% 80%, var(--bg-blob3), transparent 50%),
    radial-gradient(circle at 90% 90%, var(--bg-blob4), transparent 60%);

  background-attachment: fixed;
  background-repeat: no-repeat;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4), transparent 40%);
  pointer-events: none;
}

/* 移动端避免 fixed 背景分块/断层 */
@media (max-width: 768px){
  body{
    background-attachment: scroll;
  }
  body::before{
    position: absolute;
  }
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--glass-card);
  border-radius: 22px;
  padding: 22px;

  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);

  border: 1px solid var(--glass-border);

  box-shadow:
    0 8px 30px rgba(0,0,0,0.08),
    inset 0 1px rgba(255,255,255,0.6);
}

h1 {
  color: var(--text-title);
}

.stall {
  color: #444;
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
}

.top {
  display: flex;
  justify-content: space-between;
  color: #666;
  font-size: 14px;
}

/* ===== 自定义下拉（食堂选择） ===== */
.custom-select {
  position: relative;
  margin-top: 10px;
}

.select-trigger {
  width: 100%;
  margin: 0;
  padding: 14px;
  border-radius: 16px;
  font-size: 16px;
  background: var(--glass-sel);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: var(--text-title);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-weight: 400;
  text-align: left;
  transition: background 0.2s ease;
}

.select-trigger:hover {
  background: rgba(255,255,255,0.52);
}

.select-trigger:focus-visible {
  outline: none;
  box-shadow: 0 0 0 2px rgba(58,120,201,0.3);
}

.select-arrow {
  display: flex;
  align-items: center;
  transition: transform 0.25s ease;
  color: var(--text-title);
  line-height: 0;
}

.select-arrow.open {
  transform: rotate(180deg);
}

.select-menu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  width: 100%;
  margin: 0;
  padding: 6px;
  list-style: none;
  border-radius: 16px;
  background: rgba(255,255,255,0.58);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  z-index: 100;
  box-sizing: border-box;
  animation: dropdownIn 0.2s ease;
}

@keyframes dropdownIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.select-option {
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 16px;
  color: var(--text-title);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s ease;
}

.select-option:hover {
  background: rgba(255,255,255,0.5);
}

.select-option[aria-selected="true"] {
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(58,120,201,0.35);
  font-weight: 700;
  box-shadow: 0 0 0 2px rgba(58,120,201,0.15);
}

.select-option:active {
  transform: scale(0.98);
}


/* ===== button（按钮） ===== */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  font-size: 16px;

  background: var(--btn-primary);
  color: var(--btn-primary-text);
  font-weight: 600;

  border: none;
  border-radius: 14px;

  transition: all 0.2s ease;
}

button:hover {
  background: var(--btn-primary-hover);
}

button:active {
  transform: scale(0.96);
}

.result {
  margin-top: 15px;
  min-height: 120px;
}

.status{
  margin-top: 10px;
  min-height: 18px;
  font-size: 13px;
  color: rgba(13,43,78,0.75);
}

.status.show{
  animation: fadeIn 0.18s ease;
}

.app-blocked .select-trigger,
.app-blocked button:not(.retry-btn),
.app-blocked .chip{
  opacity: 0.55;
  pointer-events: none;
}

.app-blocked .load-error .retry-btn{
  opacity: 1;
  pointer-events: auto;
}

.app-error .filters-summary-right{
  color: #b42318;
}

.load-error{
  color: var(--text-title);
  font-size: 15px;
  line-height: 1.5;
}

.load-error .retry-btn{
  margin-top: 12px;
  width: auto;
  min-width: 120px;
  padding: 10px 16px;
}

/* ===== 新UI卡片 ===== */
.food-card {
  background: var(--glass-result);
  border-radius: 18px;
  padding: 18px;

  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);

  border: 1px solid var(--glass-border);

  box-shadow:
    0 4px 15px rgba(0,0,0,0.06),
    inset 0 1px rgba(255,255,255,0.7);
}

/* ===== 菜品图片 ===== */
.food-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 2;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 14px;
  background: rgba(255,255,255,0.25);
  border: 1px solid var(--glass-border);
  box-shadow:
    0 4px 15px rgba(0,0,0,0.06),
    inset 0 1px rgba(255,255,255,0.6);
}

/* 毛玻璃遮罩：让图片透出玻璃质感 */
.food-img-wrap::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.18) 0%,
    transparent 40%,
    transparent 70%,
    rgba(255,255,255,0.08) 100%
  );
  pointer-events: none;
  z-index: 1;
}

.food-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.35s ease, filter 0.35s ease;
  position: absolute;
  inset: 0;
}

.food-card:hover .food-img {
  transform: scale(1.05);
}

.food-img-fallback {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  aspect-ratio: 3 / 2;
  color: rgba(13,43,78,0.30);
  font-size: 44px;
  user-select: none;
}

.price {
  font-size: 18px;
  font-weight: bold;
  color: #ff6b6b;
}

.food-name {
  margin-top: 8px;
  font-size: 22px;
  font-weight: bold;
}

.tags {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tags span {
  background: var(--glass-btn-sm);
  color: var(--text-sub);

  border: 1px solid var(--glass-border);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  line-height: 1;
}

.row {
  display: flex;
  gap: 10px;
}

.row button {
  flex: 1;
}

.filters{
  margin-top: 12px;
  padding: 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.26);
  border: 1px solid rgba(255,255,255,0.60);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.filters-details{
  margin-top: 12px;
}

.filters-summary{
  list-style: none;
  padding: 12px 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.26);
  border: 1px solid rgba(255,255,255,0.60);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  user-select: none;
}

/* Chrome 默认三角 */
.filters-summary::-webkit-details-marker{
  display: none;
}

.filters-summary-left{
  font-weight: 800;
  color: rgba(13,43,78,0.92);
  flex: 0 0 auto;
}

.filters-summary-right{
  font-size: 12px;
  color: rgba(13,43,78,0.72);
  text-align: right;
  line-height: 1.25;
  flex: 1 1 auto;
}

.filters-details[open] .filters-summary{
  border-bottom-left-radius: 12px;
  border-bottom-right-radius: 12px;
}

.filters-details .filters{
  margin-top: 10px;
}

.filter-group + .filter-group{
  margin-top: 12px;
}

.filter-title{
  font-size: 13px;
  font-weight: 700;
  color: rgba(13,43,78,0.78);
  margin-bottom: 8px;
}

.chip-row{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip{
  appearance: none;
  -webkit-appearance: none;
  border: 1px solid rgba(255,255,255,0.70);
  background: rgba(255,255,255,0.30);
  color: rgba(13,43,78,0.92);
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
}

.chip[aria-pressed="true"]{
  background: rgba(255,255,255,0.55);
  border-color: rgba(58,120,201,0.55);
  box-shadow: 0 0 0 2px rgba(58,120,201,0.18);
}

.chip:active{
  transform: scale(0.98);
}

.filter-actions{
  margin-top: 12px;
}

.btn-ghost{
  background: rgba(255,255,255,0.26);
  color: rgba(13,43,78,0.92);
  border: 1px solid rgba(255,255,255,0.65);
}

.fav-list {
  margin-top: 10px;
  font-size: 14px;
}

.fav-ul{
  list-style: none;
  padding: 0;
  margin: 10px 0 0;
  display: grid;
  gap: 8px;
}

.fav-li{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.fav-empty{
  color: rgba(13,43,78,0.6);
  padding: 6px 2px;
}

.fav-name{
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fav-remove{
  width: auto;
  margin: 0;
  padding: 8px 10px;
  border-radius: 12px;
  font-size: 13px;
  background: rgba(255,255,255,0.32);
  color: rgba(13,43,78,0.9);
  border: 1px solid rgba(255,255,255,0.65);
}

button:disabled{
  opacity: 0.55;
  transform: none;
  cursor: not-allowed;
}

.sr-only{
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

@media (max-width: 480px){
  body{ background-attachment: scroll; }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container" id="appRoot">
  <div class="card">

    <h1>🍽️ 今天吃什么</h1>

    <div class="custom-select" id="canteenSelect">
      <button type="button" class="select-trigger" id="canteenTrigger" aria-haspopup="listbox" aria-expanded="false" aria-label="选择食堂">
        <span class="select-value" id="canteenValue">全部食堂</span>
        <span class="select-arrow" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M5 7L10 12L15 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
      </button>
      <ul class="select-menu" id="canteenMenu" role="listbox" aria-label="食堂列表" hidden>
        <li role="option" class="select-option" data-value="all" aria-selected="true">全部食堂</li>
        <li role="option" class="select-option" data-value="一食堂" aria-selected="false">一食堂</li>
        <li role="option" class="select-option" data-value="二食堂" aria-selected="false">二食堂</li>
      </ul>
    </div>

    <details class="filters-details" id="filtersDetails">
      <summary class="filters-summary">
        <span class="filters-summary-left">🔎 筛选</span>
        <span class="filters-summary-right" id="filtersSummaryText">口味：不限；主食：不限（可选 0 道）</span>
      </summary>

      <div class="filters" aria-label="筛选条件">
        <div class="filter-group" aria-label="口味筛选">
          <div class="filter-title">口味</div>
          <div class="chip-row" id="tasteChips"></div>
        </div>

        <div class="filter-group" aria-label="主食筛选">
          <div class="filter-title">主食</div>
          <div class="chip-row" id="stapleChips"></div>
        </div>

        <div class="filter-actions">
          <button id="clearFiltersBtn" type="button" class="btn-ghost">清空筛选</button>
        </div>
      </div>
    </details>

    <button id="primaryBtn" type="button" onclick="recommend()">🎲 开始推荐</button>

    <div class="result" id="result" aria-live="polite">点一下开始 👆</div>
    <div class="status" id="status" role="status" aria-live="polite"></div>

    <div class="row">
      <button id="favBtn" type="button" onclick="addFavorite()" disabled>❤️ 收藏</button>
      <button id="banBtn" type="button" onclick="addDislike()" disabled>🚫 不想吃</button>
    </div>

    <div class="row">
      <button id="showFavBtn" type="button" onclick="toggleFavorites()">📋 收藏</button>
      <button id="clearFavBtn" type="button" onclick="clearFavorites()" disabled>🧹 清空收藏</button>
    </div>

    <div class="fav-list" id="favList" hidden>
      <ul class="fav-ul" id="favUl"></ul>
    </div>

  </div>
</div>

<script>
/** 修改 data/foods.json 结构或需强制刷新缓存时，递增此数字 */
const FOODS_DATA_REVISION = "2";

/** 允许的 category 值；只有 main 会进入推荐池 */
const ALLOWED_CATEGORIES = new Set(["main", "side", "snack", "drink"]);

function foodsDataUrl(){
  const u = new URL("data/foods.json", window.location.href);
  u.searchParams.set("v", FOODS_DATA_REVISION);
  return u.href;
}

let foods = [];
let foodsReady = false;

let current = null;
let statusTimer = null;
let favoritesVisible = false;

const TASTE_OPTIONS = [
  { id: "辣", label: "辣" },
  { id: "香辣", label: "香辣" },
  { id: "麻辣", label: "麻辣" },
  { id: "酸辣", label: "酸辣" },
];

const STAPLE_OPTIONS = [
  { id: "米饭", label: "米饭" },
  { id: "面", label: "面" },
  { id: "粉", label: "粉" },
  { id: "饺子馄饨", label: "饺子/馄饨" },
  { id: "饼包", label: "饼/包子" },
];

const selected = {
  taste: new Set(),
  staple: new Set(),
};

function getData(key){
  return JSON.parse(localStorage.getItem(key) || "[]");
}

function setData(key,data){
  localStorage.setItem(key,JSON.stringify(data));
}

function showStatus(message){
  const el = document.getElementById("status");
  if(!el) return;
  el.textContent = message;
  el.classList.add("show");
  if(statusTimer) window.clearTimeout(statusTimer);
  statusTimer = window.setTimeout(()=>{
    el.classList.remove("show");
    el.textContent = "";
  }, 2000);
}

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll("\"","&quot;");
}

function formatLoadError(err){
  const name = err && err.name;
  const msg = err && err.message ? String(err.message) : String(err);
  if(name === "TypeError" && /fetch|Failed to fetch|Load failed|network/i.test(msg)){
    return "无法发起请求（常见于使用 file:// 打开页面，请改用本地静态服务器如 Live Server）";
  }
  if(/AbortError/i.test(name || "") || /aborted/i.test(msg)){
    return "请求已取消";
  }
  return msg;
}

/**
 * 校验并规范化菜单项；无效项记入 skipped，不混入列表。
 * tags 若非数组则置为空数组并打控制台警告，仍保留该条。
 */
function normalizeFoodsArray(rawList){
  const list = [];
  const skipped = [];

  rawList.forEach((raw, index) => {
    const pos = `#${index}`;
    if(!raw || typeof raw !== "object" || Array.isArray(raw)){
      skipped.push({ pos, reason: "不是对象" });
      return;
    }

    const canteen = typeof raw.canteen === "string" ? raw.canteen.trim() : "";
    const floor = typeof raw.floor === "string" ? raw.floor.trim() : "";
    const stall = typeof raw.stall === "string" ? raw.stall.trim() : "";
    const name = typeof raw.name === "string" ? raw.name.trim() : "";
    const priceNum = Number(raw.price);

    if(!name){
      skipped.push({ pos, reason: "name 缺失或为空" });
      return;
    }
    if(!canteen){
      skipped.push({ pos, reason: "canteen 缺失或为空" });
      return;
    }
    if(!floor){
      skipped.push({ pos, reason: "floor 缺失或为空" });
      return;
    }
    if(!stall){
      skipped.push({ pos, reason: "stall 缺失或为空" });
      return;
    }
    if(!Number.isFinite(priceNum)){
      skipped.push({ pos, reason: `price 无效（当前：${JSON.stringify(raw.price)}）`, name });
      return;
    }

    let tags = [];
    if(Array.isArray(raw.tags)){
      tags = raw.tags
        .map(t => (typeof t === "string" ? t.trim() : String(t ?? "").trim()))
        .filter(Boolean);
    }else if(raw.tags != null){
      console.warn(`[foods] ${pos}「${name}」tags 不是数组，已当作无标签`);
    }

    let category = "main";
    if(raw.category != null){
      if(typeof raw.category === "string" && ALLOWED_CATEGORIES.has(raw.category)){
        category = raw.category;
      }else{
        console.warn(`[foods] ${pos}「${name}」category 非法（${JSON.stringify(raw.category)}），已退回 main`);
      }
    }

    const image = typeof raw.image === "string" ? raw.image.trim() : "";

    list.push({ canteen, floor, stall, name, price: priceNum, tags, category, image });
  });

  return { list, skipped };
}

function setControlsDisabledForFoods(disabled){
  document.getElementById("primaryBtn")?.toggleAttribute("disabled", disabled);
  document.getElementById("clearFiltersBtn")?.toggleAttribute("disabled", disabled);
  document.querySelectorAll(".chip").forEach(b => b.toggleAttribute("disabled", disabled));
  document.getElementById("canteenTrigger")?.toggleAttribute("disabled", disabled);
}

async function loadFoods(){
  const root = document.getElementById("appRoot");
  const resultEl = document.getElementById("result");
  const summary = document.getElementById("filtersSummaryText");
  const statusEl = document.getElementById("status");

  foodsReady = false;
  root?.classList.add("app-blocked");
  root?.classList.remove("app-error");
  root?.setAttribute("aria-busy", "true");

  setControlsDisabledForFoods(true);
  if(summary) summary.textContent = "菜单加载中…";
  if(resultEl) resultEl.textContent = "正在加载菜单…";
  if(statusEl){
    statusEl.textContent = "";
    statusEl.classList.remove("show");
  }
  if(statusTimer){
    window.clearTimeout(statusTimer);
    statusTimer = null;
  }

  try{
    const res = await fetch(foodsDataUrl(), { cache: "no-cache" });
    if(!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText || ""}`.trim());
    let data;
    try{
      data = await res.json();
    }catch{
      throw new Error("解析 JSON 失败");
    }
    if(!Array.isArray(data)) throw new Error("根节点应为数组");

    const { list, skipped } = normalizeFoodsArray(data);
    if(skipped.length){
      console.warn(`[foods] 已跳过 ${skipped.length} 条无效记录：`, skipped);
    }
    if(list.length === 0){
      throw new Error(
        skipped.length
          ? "没有通过校验的菜品（请对照 data/foods.schema.json 检查字段）"
          : "菜单为空数组"
      );
    }

    foods = list;
    foodsReady = true;

    root?.classList.remove("app-blocked");
    root?.classList.remove("app-error");
    root?.removeAttribute("aria-busy");

    setControlsDisabledForFoods(false);

    current = null;
    setActionEnabled(false);
    setPrimaryLabel(false);
    if(resultEl) resultEl.textContent = "点一下开始 👆";
    updateFilterStatus();
    if(skipped.length){
      showStatus(`已跳过 ${skipped.length} 条无效菜品（详情见控制台）`);
    }
  }catch(err){
    foods = [];
    foodsReady = false;

    root?.classList.add("app-blocked");
    root?.classList.add("app-error");
    root?.removeAttribute("aria-busy");

    setControlsDisabledForFoods(true);

    const rawMsg = err && err.message ? err.message : String(err);
    const displayMsg = formatLoadError(err);
    if(summary) summary.textContent = "菜单加载失败";
    if(resultEl){
      resultEl.innerHTML = `
        <div class="load-error" role="alert">
          <strong>无法加载菜单</strong>
          <div style="margin-top:8px;opacity:0.92">${escapeHtml(displayMsg)}</div>
          <button type="button" class="retry-btn" onclick="loadFoods()">重新加载</button>
        </div>`;
    }
    const hintNet =
      /file:\/\/|Failed to fetch|fetch|NetworkError|无法发起请求/i.test(rawMsg + displayMsg);
    showStatus(
      hintNet
        ? "请使用本地静态服务器打开项目目录，勿用资源管理器双击打开 HTML。"
        : "请检查 data/foods.json 是否存在、路径正确且符合 schema。"
    );
  }
}

function setActionEnabled(enabled){
  document.getElementById("favBtn").disabled = !enabled;
  document.getElementById("banBtn").disabled = !enabled;
}

function setPrimaryLabel(hasCurrent){
  const btn = document.getElementById("primaryBtn");
  if(!btn) return;
  btn.textContent = hasCurrent ? "🔄 再来一个" : "🎲 开始推荐";
}

function hasAnyTag(food, tagList){
  const tags = Array.isArray(food?.tags) ? food.tags : [];
  return tagList.some(t => tags.includes(t));
}

function matchTaste(food){
  if(selected.taste.size === 0) return true;
  const wants = Array.from(selected.taste);
  return wants.some(t => {
    if(t === "辣") return hasAnyTag(food, ["辣"]);
    if(t === "香辣") return hasAnyTag(food, ["香辣"]);
    if(t === "麻辣") return hasAnyTag(food, ["麻辣"]);
    if(t === "酸辣") return hasAnyTag(food, ["酸辣"]);
    return false;
  });
}

function matchStaple(food){
  if(selected.staple.size === 0) return true;
  const wants = Array.from(selected.staple);
  return wants.some(s => {
    if(s === "米饭") return hasAnyTag(food, ["米饭","盖饭","炒饭","捞饭","牛肉饭","双拼饭"]);
    if(s === "面") return hasAnyTag(food, ["面","面食","面类","拌面","汤面","浇头面","板面","热干面","干拌面"]);
    if(s === "粉") return hasAnyTag(food, ["米粉","米线","鱼粉","土豆粉","粉面","汤粉","粉丝"]);
    if(s === "饺子馄饨") return hasAnyTag(food, ["水饺","馄饨"]);
    if(s === "饼包") return hasAnyTag(food, ["饼类","煎饼","包子"]);
    return false;
  });
}

function getCanteenValue(){
  if(window.__canteenSelect){
    return window.__canteenSelect.getValue();
  }
  return "all";
}

function getFilteredList(){
  const canteen = getCanteenValue();
  const dislikes = getData("dislikes");

  return foods.filter(f=>{
    return f.category === "main"
      && (canteen==="all"||f.canteen===canteen)
      && !dislikes.includes(f.name)
      && matchTaste(f)
      && matchStaple(f);
  });
}

function updateFilterStatus(){
  if(!foodsReady) return;

  const list = getFilteredList();
  const tasteText = selected.taste.size ? `口味：${Array.from(selected.taste).join("、")}` : "口味：不限";
  const stapleText = selected.staple.size ? `主食：${Array.from(selected.staple).join("、")}` : "主食：不限";
  const text = `${tasteText}；${stapleText}（可选 ${list.length} 道）`;
  showStatus(text);

  const summary = document.getElementById("filtersSummaryText");
  if(summary) summary.textContent = text;
}

function setChipPressed(btn, pressed){
  btn.setAttribute("aria-pressed", pressed ? "true" : "false");
}

function toggleSet(set, value){
  if(set.has(value)) set.delete(value);
  else set.add(value);
}

function renderChips(containerId, options, key){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;

  wrap.innerHTML = options.map(opt => {
    const id = String(opt.id || "").trim();
    const label = String(opt.label || "").trim();
    return `<button type="button" class="chip" data-filter-key="${key}" data-filter-value="${id}" aria-pressed="false">${label}</button>`;
  }).join("");

  wrap.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", (e)=>{
      const b = e.currentTarget;
      const k = b?.dataset?.filterKey;
      const v = b?.dataset?.filterValue;
      if(!k || !v) return;
      const set = selected[k];
      if(!(set instanceof Set)) return;

      toggleSet(set, v);
      setChipPressed(b, set.has(v));

      // 即时刷新：清空当前推荐，提示重新抽取
      current = null;
      setActionEnabled(false);
      setPrimaryLabel(false);
      const resultEl = document.getElementById("result");
      if(resultEl) resultEl.innerText = "已筛选，点一下开始 👆";
      updateFilterStatus();
    });
  });
}

function clearFilters(){
  selected.taste.clear();
  selected.staple.clear();

  document.querySelectorAll(".chip").forEach(btn => {
    setChipPressed(btn, false);
  });

  current = null;
  setActionEnabled(false);
  setPrimaryLabel(false);
  const resultEl = document.getElementById("result");
  if(resultEl) resultEl.innerText = "已清空筛选，点一下开始 👆";
  updateFilterStatus();
}

function recommend(){
  if(!foodsReady){
    showStatus("菜单尚未加载完成");
    return;
  }

  let list = getFilteredList();

  if(list.length===0){
    document.getElementById("result").innerText="没得选了😂";
    showStatus("提示：放宽筛选条件，或去“收藏/不想吃”看看");
    return;
  }

  let newFood;
  do {
    newFood = list[Math.floor(Math.random() * list.length)];
  } while (list.length > 1 && current && newFood.name === current.name);

  current = newFood;
  setActionEnabled(true);
  setPrimaryLabel(true);

  function makeFoodImg(src, alt){
    const wrap = document.createElement("div");
    wrap.className = "food-img-wrap";
    const img = document.createElement("img");
    img.className = "food-img";
    img.src = src;
    img.alt = alt;
    img.loading = "lazy";
    img.onerror = function(){
      this.onerror = null;
      this.parentElement.innerHTML = '<div class="food-img-fallback">🍽️</div>';
    };
    wrap.appendChild(img);
    return wrap.outerHTML;
  }

  const imgHtml = current.image
    ? makeFoodImg(current.image, current.name)
    : `<div class="food-img-wrap"><div class="food-img-fallback">🍽️</div></div>`;

  document.getElementById("result").innerHTML = `
    <div class="food-card">
      ${imgHtml}
      <div class="top">
        <span>${escapeHtml(current.canteen)} · ${escapeHtml(current.floor)}</span>
        <span class="price">￥${current.price}</span>
      </div>

      <div class="stall">🏪 ${escapeHtml(current.stall)}</div>

      <div class="food-name">${escapeHtml(current.name)}</div>

      <div class="tags">
        ${(Array.isArray(current.tags) ? current.tags : []).map(tag => `<span>${escapeHtml(tag)}</span>`).join("")}
      </div>
    </div>
  `;
}

function addFavorite(){
  if(!current) return;
  let fav = getData("favorites");
  if(!fav.includes(current.name)){
    fav.push(current.name);
    setData("favorites",fav);
    showStatus("已收藏");
    renderFavorites();
  }
  else{
    showStatus("已在收藏里");
  }
}

function addDislike(){
  if(!current) return;
  let dis = getData("dislikes");
  if(!dis.includes(current.name)){
    dis.push(current.name);
    setData("dislikes",dis);
    showStatus("已标记为不想吃");
  }
  else{
    showStatus("已经是不想吃了");
  }
}

function toggleFavorites(){
  favoritesVisible = !favoritesVisible;
  const wrap = document.getElementById("favList");
  if(wrap) wrap.hidden = !favoritesVisible;
  renderFavorites();
}

function renderFavorites(){
  let fav = getData("favorites");
  const ul = document.getElementById("favUl");
  const clearBtn = document.getElementById("clearFavBtn");
  if(clearBtn) clearBtn.disabled = fav.length===0;
  if(!ul) return;

  if(!favoritesVisible){
    return;
  }

  if(fav.length===0){
    ul.innerHTML = `<li class="fav-empty">暂无收藏</li>`;
    return;
  }

  ul.innerHTML = fav.map(name => `
    <li class="fav-li">
      <span class="fav-name">❤️ ${name}</span>
      <button type="button" class="fav-remove" data-name="${name.replaceAll('"','&quot;')}">移除</button>
    </li>
  `).join("");

  ul.querySelectorAll(".fav-remove").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      const n = e.currentTarget?.dataset?.name;
      if(!n) return;
      removeFavorite(n);
    });
  });
}

function removeFavorite(name){
  const fav = getData("favorites").filter(x=>x!==name);
  setData("favorites", fav);
  showStatus("已移除");
  renderFavorites();
}

function clearFavorites(){
  setData("favorites", []);
  showStatus("已清空收藏");
  renderFavorites();
}

/**
 * 初始化自定义食堂选择器（毛玻璃下拉组件）
 * 对外暴露 window.__canteenSelect API
 */
function initCanteenSelect(){
  const trigger = document.getElementById("canteenTrigger");
  const menu = document.getElementById("canteenMenu");
  const valueEl = document.getElementById("canteenValue");
  const arrow = trigger?.querySelector(".select-arrow");
  const options = menu?.querySelectorAll(".select-option");
  if(!trigger || !menu || !valueEl || !options) return;

  let isOpen = false;

  function getValue(){
    const sel = menu.querySelector('.select-option[aria-selected="true"]');
    return sel ? sel.dataset.value : "all";
  }

  function setValue(val){
    options.forEach(opt => {
      opt.setAttribute("aria-selected", String(opt.dataset.value === val));
    });
    const sel = menu.querySelector('.select-option[aria-selected="true"]');
    valueEl.textContent = sel ? sel.textContent : "全部食堂";
  }

  function openMenu(){
    isOpen = true;
    menu.hidden = false;
    trigger.setAttribute("aria-expanded", "true");
    arrow?.classList.add("open");
  }

  function closeMenu(){
    isOpen = false;
    menu.hidden = true;
    trigger.setAttribute("aria-expanded", "false");
    arrow?.classList.remove("open");
  }

  function onChange(){
    current = null;
    setActionEnabled(false);
    setPrimaryLabel(false);
    const resultEl = document.getElementById("result");
    if(resultEl) resultEl.innerText = "已切换食堂/筛选，点一下开始 👆";
    updateFilterStatus();
  }

  trigger.addEventListener("click", (e) => {
    e.stopPropagation();
    isOpen ? closeMenu() : openMenu();
  });

  options.forEach(opt => {
    opt.addEventListener("click", (e) => {
      e.stopPropagation();
      const val = opt.dataset.value;
      if(val !== getValue()){
        setValue(val);
        onChange();
      }
      closeMenu();
    });
  });

  // 点击外部关闭
  document.addEventListener("click", () => {
    if(isOpen) closeMenu();
  });

  // 键盘导航
  trigger.addEventListener("keydown", (e) => {
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      isOpen ? closeMenu() : openMenu();
    }
    if(e.key === "Escape" && isOpen) closeMenu();
    if((e.key === "ArrowDown" || e.key === "ArrowUp") && !isOpen){
      e.preventDefault();
      openMenu();
    }
  });

  menu.addEventListener("keydown", (e) => {
    const items = Array.from(options);
    const cur = items.findIndex(o => o.getAttribute("aria-selected") === "true");

    if(e.key === "ArrowDown"){
      e.preventDefault();
      const next = (cur + 1) % items.length;
      setValue(items[next].dataset.value);
    }
    if(e.key === "ArrowUp"){
      e.preventDefault();
      const prev = (cur - 1 + items.length) % items.length;
      setValue(items[prev].dataset.value);
    }
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      onChange();
      closeMenu();
      trigger.focus();
    }
    if(e.key === "Escape"){
      closeMenu();
      trigger.focus();
    }
  });

  // 对外暴露 API
  window.__canteenSelect = { getValue, setValue };
}

// init
setActionEnabled(false);
setPrimaryLabel(false);
renderChips("tasteChips", TASTE_OPTIONS, "taste");
renderChips("stapleChips", STAPLE_OPTIONS, "staple");
document.getElementById("clearFiltersBtn")?.addEventListener("click", clearFilters);
document.getElementById("filtersDetails")?.removeAttribute("open");
initCanteenSelect();
loadFoods();
</script>
