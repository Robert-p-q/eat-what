<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么</title>

<style>
  :root {
  /* ===== 背景 ===== */
  --bg-page:        #C9DFF7;
  --bg-blob1:       #90BCE8;
  --bg-blob2:       #5B9BD5;
  --bg-blob3:       #3A78C9;
  --bg-blob4:       #1A4F8A;

  /* ===== 毛玻璃 ===== */
  --glass-card:     rgba(255, 255, 255, 0.38);
  --glass-border:   rgba(255, 255, 255, 0.72);
  --glass-sel:      rgba(255, 255, 255, 0.45);
  --glass-btn-sm:   rgba(255, 255, 255, 0.35);
  --glass-result:   rgba(255, 255, 255, 0.32);
  --glass-blur:     blur(22px);

  /* ===== 按钮 ===== */
  --btn-primary:        #1A4F8A;
  --btn-primary-hover:  #3A78C9;
  --btn-primary-text:   #E8F3FC;

  /* ===== 文字 ===== */
  --text-title:     #0D2B4E;
  --text-sub:       #3A78C9;
  --text-hint:      #3A78C9;

  /* ===== 功能色 ===== */
  --dot-swap:       #5B9BD5;
  --dot-fav:        #E05555;
  --dot-ban:        #8FA8C0;
  --dot-favlist:    #2A9D8F;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

  background: var(--bg-page);

  background-image:
    radial-gradient(circle at 20% 20%, var(--bg-blob1), transparent 40%),
    radial-gradient(circle at 80% 30%, var(--bg-blob2), transparent 50%),
    radial-gradient(circle at 30% 80%, var(--bg-blob3), transparent 50%),
    radial-gradient(circle at 90% 90%, var(--bg-blob4), transparent 60%);

  background-attachment: fixed;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4), transparent 40%);
  pointer-events: none;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--glass-card);
  border-radius: 22px;
  padding: 22px;

  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);

  border: 1px solid var(--glass-border);

  box-shadow:
    0 8px 30px rgba(0,0,0,0.08),
    inset 0 1px rgba(255,255,255,0.6);
}

h1 {
  color: var(--text-title);
}

.stall {
  color: var(--text-sub);
}

.top {
  color: var(--text-hint);
}

.food-name {
  font-size: 22px;
  font-weight: 600;
}

.stall {
  font-size: 15px;
  color: #444;
}

.top {
  font-size: 13px;
  color: #666;
}

/* ===== select（食堂选择） ===== */
select {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 16px;
  font-size: 16px;

  background: var(--glass-sel);
  border: 1px solid var(--glass-border);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  color: var(--text-title);

  appearance: none;
  -webkit-appearance: none;

  /* iOS箭头 */
  background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 7L10 12L15 7' stroke='%230D2B4E' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
}


/* ===== button（按钮） ===== */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  font-size: 16px;

  background: var(--btn-primary);
  color: var(--btn-primary-text);
  font-weight: 600;

  border: none;
}

select:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(58,120,201,0.3);
}

button {
  background: var(--btn-primary);
  color: var(--btn-primary-text);
  font-weight: 600;

  border: none;
  border-radius: 14px;

  transition: all 0.2s ease;
}

button:hover {
  background: var(--btn-primary-hover);
}

button:active {
  transform: scale(0.96);
}

.result {
  margin-top: 15px;
  min-height: 120px;
}

/* ===== 新UI卡片 ===== */
.food-card {
  background: var(--glass-result);
  border-radius: 18px;
  padding: 18px;

  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);

  border: 1px solid var(--glass-border);

  box-shadow:
    0 4px 15px rgba(0,0,0,0.06),
    inset 0 1px rgba(255,255,255,0.7);
}

.top {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #666;
}

.price {
  font-size: 18px;
  font-weight: bold;
  color: #ff6b6b;
}

.stall {
  margin-top: 6px;
  font-size: 16px;
  color: #667eea;
  font-weight: bold;
}

.food-name {
  margin-top: 8px;
  font-size: 22px;
  font-weight: bold;
}

.tags {
  margin-top: 10px;
}

.tags span {
  background: var(--glass-btn-sm);
  color: var(--text-sub);

  border: 1px solid var(--glass-border);
}

.row {
  display: flex;
  gap: 10px;
}

.row button {
  flex: 1;
}

.fav-list {
  margin-top: 10px;
  font-size: 14px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 30px 18px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>🍽️ 今天吃什么</h1>

    <select id="canteen">
      <option value="all">全部食堂</option>
      <option value="一食堂">一食堂</option>
      <option value="二食堂">二食堂</option>
    </select>

    <button onclick="recommend()">🎲 开始推荐</button>

    <div class="result" id="result">点一下开始 👆</div>

    <div class="row">
      <button onclick="recommend()">🔄 换一个</button>
      <button onclick="addFavorite()">❤️ 收藏</button>
    </div>

    <div class="row">
      <button onclick="addDislike()">🚫 不想吃</button>
      <button onclick="showFavorites()">📋 收藏</button>
    </div>

    <div class="fav-list" id="favList"></div>

  </div>
</div>

<script>
const foods = [
  { canteen:"一食堂",floor:"2楼",stall:"兰州牛肉面",name:"尖椒牛肉拌面",price:18,tags:["面食","辣"] },
  { canteen:"一食堂",floor:"2楼",stall:"兰州牛肉面",name:"大盘鸡拌面",price:19,tags:["面食","鸡肉"] },

  { canteen:"二食堂",floor:"3楼",stall:"杂粮煎饼",name:"肉松煎饼",price:12,tags:["小吃","煎饼","热门"] },
  { canteen:"二食堂",floor:"3楼",stall:"杂粮煎饼",name:"双面烤冷面",price:9,tags:["小吃"] },

  { canteen:"二食堂",floor:"2楼",stall:"金牌拌饭",name:"招牌烤肉拌饭",price:15.8,tags:["米饭","热门"] },
  { canteen:"二食堂",floor:"2楼",stall:"金牌拌饭",name:"沙拉烤肉拌饭",price:15.8,tags:["米饭","轻食"] },

  { canteen:"二食堂",floor:"2楼",stall:"炒饭专家",name:"广式炒米粉",price:16,tags:["面食","米粉"] },
  { canteen:"二食堂",floor:"2楼",stall:"炒饭专家",name:"鲜香扬州炒饭",price:14.5,tags:["米饭","经典"] }
];

let current = null;

function getData(key){
  return JSON.parse(localStorage.getItem(key) || "[]");
}

function setData(key,data){
  localStorage.setItem(key,JSON.stringify(data));
}

function recommend(){
  let canteen = document.getElementById("canteen").value;
  let dislikes = getData("dislikes");

  let list = foods.filter(f=>{
    return (canteen==="all"||f.canteen===canteen)
      && !dislikes.includes(f.name);
  });

  if(list.length===0){
    document.getElementById("result").innerText="没得选了😂";
    return;
  }

  let newFood;

do {
  newFood = list[Math.floor(Math.random() * list.length)];
} while (list.length > 1 && current && newFood.name === current.name);

current = newFood;

  document.getElementById("result").innerHTML = `
    <div class="food-card">
      <div class="top">
        <span>${current.canteen} · ${current.floor}</span>
        <span class="price">￥${current.price}</span>
      </div>

      <div class="stall">🏪 ${current.stall}</div>

      <div class="food-name">${current.name}</div>

      <div class="tags">
        ${current.tags.map(tag => `<span>${tag}</span>`).join("")}
      </div>
    </div>
  `;
}

function addFavorite(){
  if(!current) return;
  let fav = getData("favorites");
  if(!fav.includes(current.name)){
    fav.push(current.name);
    setData("favorites",fav);
    alert("已收藏！");
  }
}

function addDislike(){
  if(!current) return;
  let dis = getData("dislikes");
  if(!dis.includes(current.name)){
    dis.push(current.name);
    setData("dislikes",dis);
    alert("已拉黑！");
  }
}

function showFavorites(){
  let fav = getData("favorites");
  let div = document.getElementById("favList");

  if(fav.length===0){
    div.innerHTML="暂无收藏";
    return;
  }

  div.innerHTML = fav.map(f=>`❤️ ${f}`).join("<br>");
}
</script>

</body>
</html>
