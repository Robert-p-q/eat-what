<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

  background: linear-gradient(135deg, #89f7fe, #66a6ff);
  background-attachment: fixed;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 20px;
  padding: 20px;

  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

select, button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 14px;
  font-size: 15px;

  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.3);

  backdrop-filter: blur(10px);
  color: #333;
}

button {
  background: rgba(255,255,255,0.35);
  color: #333;
  font-weight: bold;
}

button:active {
  transform: scale(0.97);
}

.result {
  margin-top: 15px;
  min-height: 120px;
}

/* ===== 新UI卡片 ===== */
.food-card {
  background: rgba(255,255,255,0.25);
  border-radius: 16px;
  padding: 16px;

  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.3);
  animation: fadeIn 0.3s ease;
}

.top {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #666;
}

.price {
  font-weight: bold;
  color: #ff6b6b;
}

.stall {
  margin-top: 6px;
  font-size: 14px;
  color: #667eea;
  font-weight: bold;
}

.food-name {
  margin-top: 8px;
  font-size: 20px;
  font-weight: bold;
}

.tags {
  margin-top: 10px;
}

.tags span {
  background: rgba(255,255,255,0.4);
  color: #333;
}

.row {
  display: flex;
  gap: 10px;
}

.row button {
  flex: 1;
}

.fav-list {
  margin-top: 10px;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>🍽️ 今天吃什么</h1>

    <select id="canteen">
      <option value="all">全部食堂</option>
      <option value="一食堂">一食堂</option>
      <option value="二食堂">二食堂</option>
    </select>

    <button onclick="recommend()">🎲 开始推荐</button>

    <div class="result" id="result">点一下开始 👆</div>

    <div class="row">
      <button onclick="recommend()">🔄 换一个</button>
      <button onclick="addFavorite()">❤️ 收藏</button>
    </div>

    <div class="row">
      <button onclick="addDislike()">🚫 不想吃</button>
      <button onclick="showFavorites()">📋 收藏</button>
    </div>

    <div class="fav-list" id="favList"></div>

  </div>
</div>

<script>
const foods = [
  { canteen:"一食堂",floor:"2楼",stall:"兰州牛肉面",name:"尖椒牛肉拌面",price:18,tags:["面食","辣"] },
  { canteen:"一食堂",floor:"2楼",stall:"兰州牛肉面",name:"大盘鸡拌面",price:19,tags:["面食","鸡肉"] },

  { canteen:"二食堂",floor:"3楼",stall:"杂粮煎饼",name:"肉松煎饼",price:12,tags:["小吃","煎饼","热门"] },
  { canteen:"二食堂",floor:"3楼",stall:"杂粮煎饼",name:"双面烤冷面",price:9,tags:["小吃"] },

  { canteen:"二食堂",floor:"2楼",stall:"金牌拌饭",name:"招牌烤肉拌饭",price:15.8,tags:["米饭","热门"] },
  { canteen:"二食堂",floor:"2楼",stall:"金牌拌饭",name:"沙拉烤肉拌饭",price:15.8,tags:["米饭","轻食"] },

  { canteen:"二食堂",floor:"2楼",stall:"炒饭专家",name:"广式炒米粉",price:16,tags:["面食","米粉"] },
  { canteen:"二食堂",floor:"2楼",stall:"炒饭专家",name:"鲜香扬州炒饭",price:14.5,tags:["米饭","经典"] }
];

let current = null;

function getData(key){
  return JSON.parse(localStorage.getItem(key) || "[]");
}

function setData(key,data){
  localStorage.setItem(key,JSON.stringify(data));
}

function recommend(){
  let canteen = document.getElementById("canteen").value;
  let dislikes = getData("dislikes");

  let list = foods.filter(f=>{
    return (canteen==="all"||f.canteen===canteen)
      && !dislikes.includes(f.name);
  });

  if(list.length===0){
    document.getElementById("result").innerText="没得选了😂";
    return;
  }

  current = list[Math.floor(Math.random()*list.length)];

  document.getElementById("result").innerHTML = `
    <div class="food-card">
      <div class="top">
        <span>${current.canteen} · ${current.floor}</span>
        <span class="price">￥${current.price}</span>
      </div>

      <div class="stall">🏪 ${current.stall}</div>

      <div class="food-name">${current.name}</div>

      <div class="tags">
        ${current.tags.map(tag => `<span>${tag}</span>`).join("")}
      </div>
    </div>
  `;
}

function addFavorite(){
  if(!current) return;
  let fav = getData("favorites");
  if(!fav.includes(current.name)){
    fav.push(current.name);
    setData("favorites",fav);
    alert("已收藏！");
  }
}

function addDislike(){
  if(!current) return;
  let dis = getData("dislikes");
  if(!dis.includes(current.name)){
    dis.push(current.name);
    setData("dislikes",dis);
    alert("已拉黑！");
  }
}

function showFavorites(){
  let fav = getData("favorites");
  let div = document.getElementById("favList");

  if(fav.length===0){
    div.innerHTML="暂无收藏";
    return;
  }

  div.innerHTML = fav.map(f=>`❤️ ${f}`).join("<br>");
}
</script>

</body>
</html>
