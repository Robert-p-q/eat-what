<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
  /* ===== 背景 ===== */
  --bg-page:        #C9DFF7;
  --bg-blob1:       #90BCE8;
  --bg-blob2:       #5B9BD5;
  --bg-blob3:       #3A78C9;
  --bg-blob4:       #1A4F8A;

  /* ===== 毛玻璃 ===== */
  --glass-card:     rgba(255, 255, 255, 0.38);
  --glass-border:   rgba(255, 255, 255, 0.72);
  --glass-sel:      rgba(255, 255, 255, 0.45);
  --glass-btn-sm:   rgba(255, 255, 255, 0.35);
  --glass-result:   rgba(255, 255, 255, 0.32);
  --glass-blur:     blur(22px);

  /* ===== 按钮 ===== */
  --btn-primary:        #1A4F8A;
  --btn-primary-hover:  #3A78C9;
  --btn-primary-text:   #E8F3FC;

  /* ===== 文字 ===== */
  --text-title:     #0D2B4E;
  --text-sub:       #3A78C9;
  --text-hint:      #3A78C9;

  /* ===== 功能色 ===== */
  --dot-swap:       #5B9BD5;
  --dot-fav:        #E05555;
  --dot-ban:        #8FA8C0;
  --dot-favlist:    #2A9D8F;
}

html, body{
  min-height: 100%;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

  background: var(--bg-page);

  background-image:
    radial-gradient(circle at 20% 20%, var(--bg-blob1), transparent 40%),
    radial-gradient(circle at 80% 30%, var(--bg-blob2), transparent 50%),
    radial-gradient(circle at 30% 80%, var(--bg-blob3), transparent 50%),
    radial-gradient(circle at 90% 90%, var(--bg-blob4), transparent 60%);

  background-attachment: fixed;
  background-repeat: no-repeat;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4), transparent 40%);
  pointer-events: none;
}

/* 移动端避免 fixed 背景分块/断层 */
@media (max-width: 768px){
  body{
    background-attachment: scroll;
  }
  body::before{
    position: absolute;
  }
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--glass-card);
  border-radius: 22px;
  padding: 22px;

  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);

  border: 1px solid var(--glass-border);

  box-shadow:
    0 8px 30px rgba(0,0,0,0.08),
    inset 0 1px rgba(255,255,255,0.6);
}

h1 {
  color: var(--text-title);
}

.stall {
  color: #444;
  font-size: 16px;
  font-weight: 700;
  margin-top: 6px;
}

.top {
  display: flex;
  justify-content: space-between;
  color: #666;
  font-size: 14px;
}

/* ===== select（食堂选择） ===== */
select {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 16px;
  font-size: 16px;

  background: var(--glass-sel);
  border: 1px solid var(--glass-border);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  color: var(--text-title);

  appearance: none;
  -webkit-appearance: none;

  /* iOS箭头 */
  background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 7L10 12L15 7' stroke='%230D2B4E' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
}


/* ===== button（按钮） ===== */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 14px;
  font-size: 16px;

  background: var(--btn-primary);
  color: var(--btn-primary-text);
  font-weight: 600;

  border: none;
}

select:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(58,120,201,0.3);
}

button {
  background: var(--btn-primary);
  color: var(--btn-primary-text);
  font-weight: 600;

  border: none;
  border-radius: 14px;

  transition: all 0.2s ease;
}

button:hover {
  background: var(--btn-primary-hover);
}

button:active {
  transform: scale(0.96);
}

.result {
  margin-top: 15px;
  min-height: 120px;
}

.status{
  margin-top: 10px;
  min-height: 18px;
  font-size: 13px;
  color: rgba(13,43,78,0.75);
}

.status.show{
  animation: fadeIn 0.18s ease;
}

/* ===== 新UI卡片 ===== */
.food-card {
  background: var(--glass-result);
  border-radius: 18px;
  padding: 18px;

  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);

  border: 1px solid var(--glass-border);

  box-shadow:
    0 4px 15px rgba(0,0,0,0.06),
    inset 0 1px rgba(255,255,255,0.7);
}

.price {
  font-size: 18px;
  font-weight: bold;
  color: #ff6b6b;
}

.food-name {
  margin-top: 8px;
  font-size: 22px;
  font-weight: bold;
}

.tags {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tags span {
  background: var(--glass-btn-sm);
  color: var(--text-sub);

  border: 1px solid var(--glass-border);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  line-height: 1;
}

.row {
  display: flex;
  gap: 10px;
}

.row button {
  flex: 1;
}

.filters{
  margin-top: 12px;
  padding: 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.26);
  border: 1px solid rgba(255,255,255,0.60);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.filters-details{
  margin-top: 12px;
}

.filters-summary{
  list-style: none;
  padding: 12px 14px;
  border-radius: 18px;
  background: rgba(255,255,255,0.26);
  border: 1px solid rgba(255,255,255,0.60);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  user-select: none;
}

/* Chrome 默认三角 */
.filters-summary::-webkit-details-marker{
  display: none;
}

.filters-summary-left{
  font-weight: 800;
  color: rgba(13,43,78,0.92);
  flex: 0 0 auto;
}

.filters-summary-right{
  font-size: 12px;
  color: rgba(13,43,78,0.72);
  text-align: right;
  line-height: 1.25;
  flex: 1 1 auto;
}

.filters-details[open] .filters-summary{
  border-bottom-left-radius: 12px;
  border-bottom-right-radius: 12px;
}

.filters-details .filters{
  margin-top: 10px;
}

.filter-group + .filter-group{
  margin-top: 12px;
}

.filter-title{
  font-size: 13px;
  font-weight: 700;
  color: rgba(13,43,78,0.78);
  margin-bottom: 8px;
}

.chip-row{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip{
  appearance: none;
  -webkit-appearance: none;
  border: 1px solid rgba(255,255,255,0.70);
  background: rgba(255,255,255,0.30);
  color: rgba(13,43,78,0.92);
  padding: 8px 10px;
  border-radius: 999px;
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
}

.chip[aria-pressed="true"]{
  background: rgba(255,255,255,0.55);
  border-color: rgba(58,120,201,0.55);
  box-shadow: 0 0 0 2px rgba(58,120,201,0.18);
}

.chip:active{
  transform: scale(0.98);
}

.filter-actions{
  margin-top: 12px;
}

.btn-ghost{
  background: rgba(255,255,255,0.26);
  color: rgba(13,43,78,0.92);
  border: 1px solid rgba(255,255,255,0.65);
}

.fav-list {
  margin-top: 10px;
  font-size: 14px;
}

.fav-ul{
  list-style: none;
  padding: 0;
  margin: 10px 0 0;
  display: grid;
  gap: 8px;
}

.fav-li{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.fav-empty{
  color: rgba(13,43,78,0.6);
  padding: 6px 2px;
}

.fav-name{
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fav-remove{
  width: auto;
  margin: 0;
  padding: 8px 10px;
  border-radius: 12px;
  font-size: 13px;
  background: rgba(255,255,255,0.32);
  color: rgba(13,43,78,0.9);
  border: 1px solid rgba(255,255,255,0.65);
}

button:disabled{
  opacity: 0.55;
  transform: none;
  cursor: not-allowed;
}

.sr-only{
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

@media (max-width: 480px){
  body{ background-attachment: scroll; }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1;}
}
</style>
</head>

    <div class="result" id="result" aria-live="polite">点一下开始 👆</div>
    <div class="status" id="status" role="status" aria-live="polite"></div>

    <div class="row">
      <button id="favBtn" type="button" onclick="addFavorite()" disabled>❤️ 收藏</button>

    <div class="fav-list" id="favList" hidden>

    </div>

  </div>
</div>

let current = null;
let statusTimer = null;
let favoritesVisible = false;

const TASTE_OPTIONS = [
  { id: "辣", label: "辣" },
  { id: "香辣", label: "香辣" },
  { id: "麻辣", label: "麻辣" },
  { id: "酸辣", label: "酸辣" },
];

const STAPLE_OPTIONS = [
  { id: "米饭", label: "米饭" },
  { id: "面", label: "面" },
  { id: "粉", label: "粉" },
  { id: "饺子馄饨", label: "饺子/馄饨" },
  { id: "饼包", label: "饼/包子" },
];

const selected = {
  taste: new Set(),
  staple: new Set(),
};

function getData(key){
  return JSON.parse(localStorage.getItem(key) || "[]");
}

function setData(key,data){
  localStorage.setItem(key,JSON.stringify(data));
}

function showStatus(message){
  const el = document.getElementById("status");
  if(!el) return;
  el.textContent = message;
  el.classList.add("show");
  if(statusTimer) window.clearTimeout(statusTimer);
  statusTimer = window.setTimeout(()=>{
    el.classList.remove("show");
    el.textContent = "";
  }, 2000);
}

function setActionEnabled(enabled){
  document.getElementById("favBtn").disabled = !enabled;
  document.getElementById("banBtn").disabled = !enabled;
}

function setPrimaryLabel(hasCurrent){
  const btn = document.getElementById("primaryBtn");
  if(!btn) return;
  btn.textContent = hasCurrent ? "🔄 再来一个" : "🎲 开始推荐";
}

function hasAnyTag(food, tagList){
  const tags = Array.isArray(food?.tags) ? food.tags : [];
  return tagList.some(t => tags.includes(t));
}

function matchTaste(food){
  if(selected.taste.size === 0) return true;
  const wants = Array.from(selected.taste);
  return wants.some(t => {
    if(t === "辣") return hasAnyTag(food, ["辣"]);
    if(t === "香辣") return hasAnyTag(food, ["香辣"]);
    if(t === "麻辣") return hasAnyTag(food, ["麻辣"]);
    if(t === "酸辣") return hasAnyTag(food, ["酸辣"]);
    return false;
  });
}

function matchStaple(food){
  if(selected.staple.size === 0) return true;
  const wants = Array.from(selected.staple);
  return wants.some(s => {
    if(s === "米饭") return hasAnyTag(food, ["米饭","盖饭","炒饭","捞饭","牛肉饭","双拼饭"]);
    if(s === "面") return hasAnyTag(food, ["面","面食","面类","拌面","汤面","浇头面","板面","热干面","干拌面"]);
    if(s === "粉") return hasAnyTag(food, ["米粉","米线","鱼粉","土豆粉","粉面","汤粉","粉丝"]);
    if(s === "饺子馄饨") return hasAnyTag(food, ["水饺","馄饨"]);
    if(s === "饼包") return hasAnyTag(food, ["饼类","煎饼","包子"]);
    return false;
  });
}

function getFilteredList(){
  const canteen = document.getElementById("canteen")?.value || "all";
  const dislikes = getData("dislikes");

  return foods.filter(f=>{
    return (canteen==="all"||f.canteen===canteen)
      && !dislikes.includes(f.name)
      && matchTaste(f)
      && matchStaple(f);
  });
}

function updateFilterStatus(){
  const list = getFilteredList();
  const tasteText = selected.taste.size ? `口味：${Array.from(selected.taste).join("、")}` : "口味：不限";
  const stapleText = selected.staple.size ? `主食：${Array.from(selected.staple).join("、")}` : "主食：不限";
  const text = `${tasteText}；${stapleText}（可选 ${list.length} 道）`;
  showStatus(text);

  const summary = document.getElementById("filtersSummaryText");
  if(summary) summary.textContent = text;
}

function setChipPressed(btn, pressed){
  btn.setAttribute("aria-pressed", pressed ? "true" : "false");
}

function toggleSet(set, value){
  if(set.has(value)) set.delete(value);
  else set.add(value);
}

function renderChips(containerId, options, key){
  const wrap = document.getElementById(containerId);
  if(!wrap) return;

  wrap.innerHTML = options.map(opt => {
    const id = String(opt.id || "").trim();
    const label = String(opt.label || "").trim();
    return `<button type="button" class="chip" data-filter-key="${key}" data-filter-value="${id}" aria-pressed="false">${label}</button>`;
  }).join("");

  wrap.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", (e)=>{
      const b = e.currentTarget;
      const k = b?.dataset?.filterKey;
      const v = b?.dataset?.filterValue;
      if(!k || !v) return;
      const set = selected[k];
      if(!(set instanceof Set)) return;

      toggleSet(set, v);
      setChipPressed(b, set.has(v));

      // 即时刷新：清空当前推荐，提示重新抽取
      current = null;
      setActionEnabled(false);
      setPrimaryLabel(false);
      const resultEl = document.getElementById("result");
      if(resultEl) resultEl.innerText = "已筛选，点一下开始 👆";
      updateFilterStatus();
    });
  });
}

function clearFilters(){
  selected.taste.clear();
  selected.staple.clear();

  document.querySelectorAll(".chip").forEach(btn => {
    setChipPressed(btn, false);
  });

  current = null;
  setActionEnabled(false);
  setPrimaryLabel(false);
  const resultEl = document.getElementById("result");
  if(resultEl) resultEl.innerText = "已清空筛选，点一下开始 👆";
  updateFilterStatus();
}

function recommend(){
  let list = getFilteredList();

  if(list.length===0){
    document.getElementById("result").innerText="没得选了😂";
    showStatus("提示：放宽筛选条件，或去“收藏/不想吃”看看");
    return;
  }

  let newFood;

do {
  newFood = list[Math.floor(Math.random() * list.length)];
} while (list.length > 1 && current && newFood.name === current.name);

current = newFood;
setActionEnabled(true);
setPrimaryLabel(true);

  document.getElementById("result").innerHTML = `
    <div class="food-card">
      <div class="top">
        <span>${current.canteen} · ${current.floor}</span>
        <span class="price">￥${current.price}</span>
      </div>

      <div class="stall">🏪 ${current.stall}</div>

      <div class="food-name">${current.name}</div>

      <div class="tags">
        ${current.tags.map(tag => `<span>${tag}</span>`).join("")}
      </div>
    </div>
  `;
}

function addFavorite(){
  if(!current) return;
  let fav = getData("favorites");
  if(!fav.includes(current.name)){
    fav.push(current.name);
    setData("favorites",fav);
    showStatus("已收藏");
    renderFavorites();
  }
  else{
    showStatus("已在收藏里");
  }
}

function addDislike(){
  if(!current) return;
  let dis = getData("dislikes");
  if(!dis.includes(current.name)){
    dis.push(current.name);
    setData("dislikes",dis);
    showStatus("已标记为不想吃");
  }
  else{
    showStatus("已经是不想吃了");
  }
}

function toggleFavorites(){
  favoritesVisible = !favoritesVisible;
  const wrap = document.getElementById("favList");
  if(wrap) wrap.hidden = !favoritesVisible;
  renderFavorites();
}

function renderFavorites(){
  let fav = getData("favorites");
  const ul = document.getElementById("favUl");
  const clearBtn = document.getElementById("clearFavBtn");
  if(clearBtn) clearBtn.disabled = fav.length===0;
  if(!ul) return;

  if(!favoritesVisible){
    return;
  }

  if(fav.length===0){
    ul.innerHTML = `<li class="fav-empty">暂无收藏</li>`;
    return;
  }

  ul.innerHTML = fav.map(name => `
    <li class="fav-li">
      <span class="fav-name">❤️ ${name}</span>
      <button type="button" class="fav-remove" data-name="${name.replaceAll('"','&quot;')}">移除</button>
    </li>
  `).join("");

  ul.querySelectorAll(".fav-remove").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      const n = e.currentTarget?.dataset?.name;
      if(!n) return;
      removeFavorite(n);
    });
  });
}

function removeFavorite(name){
  const fav = getData("favorites").filter(x=>x!==name);
  setData("favorites", fav);
  showStatus("已移除");
  renderFavorites();
}

function clearFavorites(){
  setData("favorites", []);
  showStatus("已清空收藏");
  renderFavorites();
}

// init
setActionEnabled(false);
setPrimaryLabel(false);
renderChips("tasteChips", TASTE_OPTIONS, "taste");
renderChips("stapleChips", STAPLE_OPTIONS, "staple");
document.getElementById("clearFiltersBtn")?.addEventListener("click", clearFilters);
document.getElementById("filtersDetails")?.removeAttribute("open");
document.getElementById("canteen")?.addEventListener("change", ()=>{
  current = null;
  setActionEnabled(false);
  setPrimaryLabel(false);
  const resultEl = document.getElementById("result");
  if(resultEl) resultEl.innerText = "已切换食堂/筛选，点一下开始 👆";
  updateFilterStatus();
});
updateFilterStatus();
</script>
